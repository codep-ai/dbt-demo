config:
  send_anonymous_usage_stats: false

jaffle_shop:
  target: jaffle
  outputs:
    jaffle:
      type: postgres
      host: "{{ env_var('PGHOST') }}"
      port: "{{ env_var('PGPORT') | as_number }}"
      user: "{{ env_var('PGUSER') }}"
      pass: "{{ env_var('PGPASSWORD') }}"
      dbname: "{{ env_var('PGDATABASE') }}"
      sslmode: disable
      schema: "{{ env_var('SEED_SCHEMA', 'jaffle') }}"
datapai_snowflake:
  target: dev
  outputs:
    dev:
      type: snowflake
      account:  "{{ env_var('SNOWFLAKE_ACCOUNT') }}"

      # User/password auth
      user:  "{{ env_var('SNOWFLAKE_USER') }}"
      password:  "{{ env_var('SNOWFLAKE_PASSWORD') }}"

      role: "{{ env_var('SNOWFLAKE_ROLE') }}"
      database:  "{{ env_var('SNOWFLAKE_DATABASE') }}"
      warehouse:  "{{ env_var('SNOWFLAKE_WAREHOUSE') }}"
      schema:  "{{ env_var('SNOWFLAKE_SCHEMA') }}"
      threads: 3
      client_session_keep_alive: False
      query_tag: "datapai snowflake dev"

      # optional
      connect_retries: 0 # default 0
      connect_timeout: 10 # default: 10
      retry_on_database_errors: False # default: false
      retry_all: False  # default: false
      reuse_connections: False # default: false

datapai:
  target: dev-local
  outputs:

    # CI/CD runs on schema dbt_ci
    ci_fal:
      type: redshift
      method: database
      cluster_id: redshift-cluster-1
      host: "{{ env_var('REDSHIFT_HOST') }}"
      user: "{{ env_var('REDSHIFT_USER') }}"
      password: "{{ env_var('REDSHIFT_PWD') }}"   
      region: ap-southeast-2
      iam_duration_seconds: 3600
      port: "{{ env_var('REDSHIFT_PORT')| as_number }}"
      dbname: dev
      schema: datapai
      threads: 8
      keepalives_idle: 240 # default 240 seconds
      connect_timeout: 10 # default 10 seconds
      retries: 1 # default 1 retry on error/timeout when opening connections
      autocreate: true
      ra3_node: false


    dev-local:
      type: redshift
      method: database
      cluster_id: redshift-cluster-1
      host: "{{ env_var('REDSHIFT_HOST') }}"
      user: "{{ env_var('REDSHIFT_USER') }}"
      password: "{{ env_var('REDSHIFT_PWD') }}"   
      region: ap-southeast-2
      iam_duration_seconds: 3600
      port: "{{ env_var('REDSHIFT_PORT') | as_number }}"
      dbname: dev
      schema: datapai
      threads: 4
      keepalives_idle: 240 # default 240 seconds
      connect_timeout: 10 # default 10 seconds
      retries: 1 # default 1 retry on error/timeout when opening connections
      autocreate: true
      ra3_node: false
    logs:
    # Enable logging for dbt-rpc
    dbt_rpc: debug  # Set the log level to debug for dbt-rpc.

# ─────────────────────────────────────────────────────────────────────────────
# ClickHouse adapter — intentionally NOT configured here.
#
# Architecture decision (2026-06-22): dbt-snowflake is the one and only dbt
# adapter we run. ClickHouse is fed by Kafka engine + Materialized View
# (CH's own native ELT primitives), not by dbt. dbt's value is in the
# audit-bound Snowflake marts; CH realtime transforms are event-driven and
# do not need a batch transform layer on top.
#
# Models stay portable across adapters by being written in a portable SQL
# subset (no SF-specific QUALIFY/LATERAL FLATTEN/STREAMS unless gated by
# a macro). If TMGM or another customer later consolidates to CH-only,
# add a datapai_clickhouse block here and `dbt run --profile
# datapai_clickhouse`; ~80–90% of marts port without changes.
#
# See: docs/architecture/4-layer-lakehouse-narrative.md
#      docs/architecture/kafka-routing-decision.md (cfd-be)
# ─────────────────────────────────────────────────────────────────────────────
