config:
  send_anonymous_usage_stats: false

jaffle_shop:
  target: jaffle
  outputs:
    jaffle:
      type: postgres
      host: "{{ env_var('PGHOST') }}"
      port: "{{ env_var('PGPORT') | as_number }}"
      user: "{{ env_var('PGUSER') }}"
      pass: "{{ env_var('PGPASSWORD') }}"
      dbname: "{{ env_var('PGDATABASE') }}"
      sslmode: disable
      schema: "{{ env_var('SEED_SCHEMA', 'jaffle') }}"
datapai_snowflake:
  target: dev
  outputs:
    dev:
      type: snowflake
      account:  "{{ env_var('SNOWFLAKE_ACCOUNT') }}"

      # User/password auth
      user:  "{{ env_var('SNOWFLAKE_USER') }}"
      password:  "{{ env_var('SNOWFLAKE_PASSWORD') }}"

      role: "{{ env_var('SNOWFLAKE_ROLE') }}"
      database:  "{{ env_var('SNOWFLAKE_DATABASE') }}"
      warehouse:  "{{ env_var('SNOWFLAKE_WAREHOUSE') }}"
      schema:  "{{ env_var('SNOWFLAKE_SCHEMA') }}"
      threads: 3
      client_session_keep_alive: False
      query_tag: "datapai snowflake dev"

      # optional
      connect_retries: 0 # default 0
      connect_timeout: 10 # default: 10
      retry_on_database_errors: False # default: false
      retry_all: False  # default: false
      reuse_connections: False # default: false

datapai:
  target: dev-local
  outputs:

    # CI/CD runs on schema dbt_ci
    ci_fal:
      type: redshift
      method: database
      cluster_id: redshift-cluster-1
      host: "{{ env_var('REDSHIFT_HOST') }}"
      user: "{{ env_var('REDSHIFT_USER') }}"
      password: "{{ env_var('REDSHIFT_PWD') }}"   
      region: ap-southeast-2
      iam_duration_seconds: 3600
      port: "{{ env_var('REDSHIFT_PORT')| as_number }}"
      dbname: dev
      schema: datapai
      threads: 8
      keepalives_idle: 240 # default 240 seconds
      connect_timeout: 10 # default 10 seconds
      retries: 1 # default 1 retry on error/timeout when opening connections
      autocreate: true
      ra3_node: false


    dev-local:
      type: redshift
      method: database
      cluster_id: redshift-cluster-1
      host: "{{ env_var('REDSHIFT_HOST') }}"
      user: "{{ env_var('REDSHIFT_USER') }}"
      password: "{{ env_var('REDSHIFT_PWD') }}"   
      region: ap-southeast-2
      iam_duration_seconds: 3600
      port: "{{ env_var('REDSHIFT_PORT') | as_number }}"
      dbname: dev
      schema: datapai
      threads: 4
      keepalives_idle: 240 # default 240 seconds
      connect_timeout: 10 # default 10 seconds
      retries: 1 # default 1 retry on error/timeout when opening connections
      autocreate: true
      ra3_node: false
    logs:
    # Enable logging for dbt-rpc
    dbt_rpc: debug  # Set the log level to debug for dbt-rpc.

# ─────────────────────────────────────────────────────────────────────────────
# ClickHouse adapter — CONFIGURED AND READY (engine-portability lever)
#
# Two roles for ClickHouse in our architecture. Only ONE of them uses dbt:
#
#   1. CH as the REALTIME serving tier (alongside Snowflake, today's shape).
#      Fed by Kafka engine + Materialized View + ReplacingMergeTree, NOT
#      by dbt. The realtime path does not flow through this profile.
#
#   2. CH as the WAREHOUSE (replacing Snowflake entirely if a customer
#      consolidates to cut SF cost). This is exactly when dbt-clickhouse
#      earns its keep — same dbt models, swap the profile target, recompile.
#      ~80–90% of marts port without changes; SF-specific Jinja gates the
#      remaining 10–20%. Migration becomes a 3–6 week dbt re-target instead
#      of a 12-month hand-rewrite.
#
# Both adapters configured side-by-side IS the proof of the warehouse-
# portability commercial promise we make to TMGM and similar customers.
# Without this block, that promise is theoretical. With it, the swap is a
# `dbt run --profile datapai_clickhouse` demo away.
#
# Schema `cfd` in CH used for the consolidation case; staging models still
# read from source('cfd_lake', ...) — under dbt-clickhouse this resolves via
# the iceberg() table function pointed at s3://customer-cfd-lake/.
#
# See: ~/git/datapai-cfd-be/docs/architecture/4-layer-lakehouse-narrative.md
#      ~/git/datapai-cfd-be/docs/architecture/kafka-routing-decision.md
#      ~/git/datapai-cfd-be/docs/strategy/2026-06-15-datapai-tmgm-information-brief.md §1.6
# ─────────────────────────────────────────────────────────────────────────────
datapai_clickhouse:
  target: dev
  outputs:
    dev:
      type: clickhouse
      driver: http
      host: "{{ env_var('CLICKHOUSE_HOST', '127.0.0.1') }}"
      port: "{{ env_var('CLICKHOUSE_HTTP_PORT', '8123') | as_number }}"
      user: default
      password: "{{ env_var('OPENLIT_CLICKHOUSE_PASSWORD', 'datapai') }}"
      schema: cfd
      secure: false
      connect_timeout: 10
      send_receive_timeout: 60
      sync_request_timeout: 10
      check_exchange: true
      use_lw_deletes: false
      cluster_mode: false
