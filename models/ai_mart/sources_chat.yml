version: 2

sources:
  - name: ai_chat_history
    database: DATAPAI
    schema: AI_MART
    description: >
      Immutable chat history Parquet archive (Phase 1.13). Source-of-truth
      for AI conversation audit. External table over s3://codepais3/stock/raw/chat_history/.
      DDL in macros/setup_ai_chat_external.sql.
    tables:
      - name: ext_chat_history
        description: >
          Per-message rows archived from framework_db.datapai.chat_messages JOIN
          chat_sessions. Partitioned by year/month/day via S3 path. No PII
          redaction on this layer; downstream fct_ai_chat_message applies SHA-256
          hashing to content.
