version: 2

seeds:
  - name: ai_agents_seed
    description: >
      AI agent catalog — feeds dim_ai_agent. Grain: one row per agent
      (sub-unit of a system; e.g. bull/bear/moderator inside a Debate
      Agent each get their own row).

      SHIPPED CONTENT = EXAMPLE / DEMO DATA.
      The 26 rows shipped in this seed are DATAPAI's own internal agent
      catalog across stock / health / platform domains. They are included
      so the product demos out-of-the-box — without example data, dim_ai_agent
      is empty and downstream dashboards / fct_ai_chat_message joins /
      ComplianceAssessmentAgent have nothing to show.

      CUSTOMER SHOULD REPLACE these rows with their own agent inventory
      before production deployment — either by editing this CSV in their
      dbt package fork, by DB insert into `DATAPAI.AI_MART.AI_AGENTS_SEED`,
      or via the runtime agent-registration API (future).

      Hierarchy (agent / system / vendor / llm / governance / lifecycle)
      denormalized as flat columns; no mini-dims.
    config:
      quote_columns: false
    columns:
      - name: agent_key
        description: Unique agent identifier (format <domain>.<system>.<role>)
        tests: [unique, not_null]
      - name: agent_name
        description: Agent binary / class name
        tests: [unique, not_null]
      - name: agent_role
        tests: [not_null]
      - name: system_name
        description: Parent system grouping — multiple agents share one system
        tests: [not_null]
      - name: domain
        tests:
          - not_null
          - accepted_values:
              values: [stock, health, trade, platform]
      - name: vendor_name
        tests: [not_null]
      - name: llm_name
        tests: [not_null]
      - name: risk_tier
        tests:
          - not_null
          - accepted_values:
              values: [low, medium, high]
      - name: approval_status
        tests:
          - not_null
          - accepted_values:
              values: [approved, pending, deprecated]
      - name: primary_control_framework
        description: FK to dim_ai_control.framework_code
      - name: primary_control_id
        description: FK to dim_ai_control.control_id (within framework)
